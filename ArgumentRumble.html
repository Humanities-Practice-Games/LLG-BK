<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argument Showdown</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2); 
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-slate-100 min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // Firebase Imports (Modular from CDN)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Custom SVG Icons (Replacing lucide-react) ---
        const Icon = ({ paths, className = "w-6 h-6", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {paths}
            </svg>
        );

        const Loader2 = (p) => <Icon {...p} paths={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />;
        const Scale = (p) => <Icon {...p} paths={<><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></>} />;
        const Trophy = (p) => <Icon {...p} paths={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>} />;
        const Users = (p) => <Icon {...p} paths={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const Swords = (p) => <Icon {...p} paths={<><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="5" y2="9"/><line x1="5" x2="3" y1="3" y2="5"/></>} />;
        const Clock = (p) => <Icon {...p} paths={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const AlertCircle = (p) => <Icon {...p} paths={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>} />;
        const Copy = (p) => <Icon {...p} paths={<><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>} />;
        const ChevronRight = (p) => <Icon {...p} paths={<path d="m9 18 6-6-6-6"/>} />;
        const BookOpen = (p) => <Icon {...p} paths={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const ArrowLeft = (p) => <Icon {...p} paths={<><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>} />;
        const Sparkles = (p) => <Icon {...p} paths={<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>} />;
        const UserCircle = (p) => <Icon {...p} paths={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></>} />;
        const Bot = (p) => <Icon {...p} paths={<><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></>} />;

        // --- Configuration & Initialization ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'argument-arena-default';

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase init error:", e);
        }

        // --- Sample AP Lang Claims & Bot Responses ---
        const CLAIMS = [
            { text: "The decline of reading for pleasure is a significant problem for society.", botResponse: "The decline of reading is a massive societal flaw because, as history demonstrates, an uninformed populace is easily manipulated. For example, in Ray Bradbury's novel Fahrenheit 451, the banning of books leads directly to a shallow, compliant society unable to think critically. Therefore, losing the habit of reading strips us of our intellectual defenses and empathy." },
            { text: "Failure is a more valuable teacher than success.", botResponse: "Failure provides necessary course correction, whereas success breeds complacency. Historically, Thomas Edison famously failed thousands of times before inventing the lightbulb. Each failure demonstrated what did not work, illustrating that progress is built on a foundation of mistakes. Consequently, failure forces adaptation, making it the ultimate teacher." },
            { text: "Politeness is a necessary social lubricant, even when it involves deception.", botResponse: "Absolute honesty can be destructive, making politeness essential for maintaining social order. For example, in international diplomacy, leaders often use polite, deceptive language to avoid unnecessary conflict and negotiate peace treaties. Thus, prioritizing pure truth over tact can lead to the breakdown of essential relationships." },
            { text: "The increasing reliance on technology makes humans less capable of independent thought.", botResponse: "Over-reliance on technology degrades human cognitive stamina. Studies show that relying on GPS navigation reduces our spatial awareness and memory. Furthermore, when algorithms curate our news feeds, we are trapped in echo chambers, proving that outsourcing our thinking to machines fundamentally weakens our ability to form independent, critical judgments." },
            { text: "Certainty is more dangerous than doubt.", botResponse: "Absolute certainty prevents growth and leads to extremism, while doubt drives discovery. During the Scientific Revolution, Galileo doubted the universally accepted, 'certain' geocentric model of the universe. His skepticism allowed humanity to understand the solar system. Therefore, certainty creates blind spots, while doubt opens the door to truth." },
            { text: "It is better to be a generalist than a specialist in today's world.", botResponse: "In a rapidly changing world, adaptability is superior to hyper-specialization. A historical example is Leonardo da Vinci, a polymath whose diverse knowledge across art, anatomy, and engineering allowed him to innovate uniquely. Conversely, specialists often become obsolete when their narrow field changes, proving that generalists are more resilient." },
            { text: "Disobedience is a valuable human trait that promotes social progress.", botResponse: "Social progress is rarely achieved without challenging unjust laws. The Civil Rights movement, led by figures like Martin Luther King Jr., relied heavily on civil disobedience. By actively refusing to comply with segregation, they exposed the immorality of the system. Thus, calculated disobedience is the engine of moral evolution." },
            { text: "The most essential skill for success in the modern world is adaptability.", botResponse: "The modern era is defined by technological disruption, making adaptability paramount. When streaming technology emerged, Blockbuster refused to adapt and subsequently collapsed, while Netflix pivoted and thrived. This illustrates that survival is not about current strength, but the ability to evolve in response to changing environments." },
            { text: "Humor is the most effective tool for addressing controversial topics.", botResponse: "Humor lowers defensive barriers, allowing harsh truths to be digested. In Jonathan Swift's satirical essay 'A Modest Proposal,' he used extreme dark humor to criticize the British treatment of the impoverished Irish. This approach highlights absurdity without preaching, making humor a powerful weapon for social critique." },
            { text: "Society places too much emphasis on individual achievement over collective well-being.", botResponse: "The hyper-focus on individualism leads directly to societal exploitation. This is evident in the 'Tragedy of the Commons,' where individuals acting in their own self-interest deplete shared resources, ultimately harming everyone. Therefore, without prioritizing the collective, individual ambition becomes destructive to the very society that supports it." }
        ];

        const getRandomClaimObj = () => CLAIMS[Math.floor(Math.random() * CLAIMS.length)];

        // --- Strict Heuristic Judge (No API Required) ---
        const evaluateWithHeuristics = (claimObj, p1Text, p2Text, p1Id, p2Id) => {
            const claimWords = claimObj.text.toLowerCase().split(/\W+/).filter(w => w.length > 3);
            
            const scoreText = (text) => {
                let score = 0;
                let feedbackPoints = [];
                const words = text.toLowerCase().split(/\W+/).filter(w => w.length > 0);
                
                // 1. Substance & Length (Max 30)
                if (words.length >= 45) { score += 30; feedbackPoints.push("Excellent length and substantive development."); }
                else if (words.length >= 25) { score += 15; feedbackPoints.push("Argument is adequately developed but could be deeper."); }
                else { score += 5; feedbackPoints.push("Severely lacks length and development. Too brief."); }

                // 2. Transitional Logic & Warrants (Max 30)
                const transitions = ["because", "therefore", "thus", "consequently", "illustrates", "demonstrates", "proves", "however", "furthermore", "moreover", "whereas", "although"];
                let transCount = words.filter(w => transitions.includes(w)).length;
                if (transCount >= 3) { score += 30; feedbackPoints.push("Strong use of transitional logic to connect evidence to the claim."); }
                else if (transCount > 0) { score += 15; feedbackPoints.push("Some logical transitions present, but warrants could be stronger."); }
                else { feedbackPoints.push("Missing clear transition words; logic feels disconnected."); }

                // 3. Specific Evidence Markers (Max 25)
                const evidenceMarkers = ["example", "history", "novel", "study", "society", "century", "war", "author", "article", "world", "book", "historically", "movement", "event"];
                let evCount = words.filter(w => evidenceMarkers.includes(w)).length;
                if (evCount >= 2) { score += 25; feedbackPoints.push("Clear references to external specific evidence (history/literature)."); }
                else if (evCount === 1) { score += 10; feedbackPoints.push("Attempted to use specific evidence, but it may be vague."); }
                else { feedbackPoints.push("Argument relies too much on hypotheticals; lacks concrete evidence markers."); }

                // 4. Relevance to Claim (Max 15)
                let relevanceCount = claimWords.filter(cw => words.includes(cw)).length;
                if (relevanceCount >= 2) { score += 15; feedbackPoints.push("Directly addresses the prompt's key terms."); }
                else { score += 5; feedbackPoints.push("Struggles to directly anchor back to the specific terms of the claim."); }

                // Random tie-breaker slight variance (0-3 points)
                score += Math.floor(Math.random() * 4);
                if (score > 100) score = 100;

                return { score, feedback: feedbackPoints.join(" ") };
            };

            const p1Result = scoreText(p1Text);
            const p2Result = scoreText(p2Text);
            
            let winnerId = 'tie';
            if (p1Result.score > p2Result.score) winnerId = p1Id;
            else if (p2Result.score > p1Result.score) winnerId = p2Id;

            return { 
                winnerId, 
                p1Score: p1Result.score, 
                p2Score: p2Result.score,
                p1Feedback: p1Result.feedback,
                p2Feedback: p2Result.feedback
            };
        };

        // --- Helper Functions ---
        const generateRoomCode = () => Math.random().toString(36).substring(2, 6).toUpperCase();

        // --- Main Application Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [error, setError] = useState('');
            
            const [room, setRoom] = useState(null);
            const [roomId, setRoomId] = useState(null);
            const [joinCodeInput, setJoinCodeInput] = useState('');
            
            const [playerId] = useState(() => 'player_' + Math.random().toString(36).substring(2, 10));
            const [mySubmission, setMySubmission] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            // 1. Initialize Auth
            useEffect(() => {
                if (!auth) {
                    setAuthLoading(false);
                    setError("Firebase configuration missing.");
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        setError("Failed to authenticate.");
                        setAuthLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Room Listener
            useEffect(() => {
                if (!user || !roomId) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                
                const unsubscribe = onSnapshot(roomRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setRoom(docSnap.data());
                    } else {
                        if (room && room.status !== 'finished') {
                            setError("The match was ended.");
                        }
                        setRoom(null);
                        setRoomId(null);
                        setMySubmission('');
                    }
                }, () => setError("Lost connection to room."));

                return () => unsubscribe();
            }, [user, roomId]);

            // 3. Judging Logic
            useEffect(() => {
                if (!room || !user) return;
                if (room.status === 'judging' && room.host === playerId) {
                    const p1Id = room.players[0];
                    const p2Id = room.players[1];
                    const p1Text = room.submissions[p1Id];
                    const p2Text = room.submissions[p2Id];

                    if (p1Text && p2Text && !room.lastResult) {
                        handleJudging(room, p1Id, p2Id, p1Text, p2Text);
                    }
                }
            }, [room?.status, room?.submissions]);

            const handleJudging = async (currentRoom, p1Id, p2Id, p1Text, p2Text) => {
                try {
                    // Dramatic delay
                    await new Promise(r => setTimeout(r, 2000));

                    const result = evaluateWithHeuristics(currentRoom.claimObj, p1Text, p2Text, p1Id, p2Id);
                    let newScores = { ...currentRoom.scores };
                    if (result.winnerId !== 'tie' && newScores[result.winnerId] !== undefined) {
                        newScores[result.winnerId] += 1;
                    }
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                    await updateDoc(roomRef, {
                        status: 'finished',
                        scores: newScores,
                        lastResult: { 
                            winnerId: result.winnerId, 
                            p1Score: result.p1Score,
                            p2Score: result.p2Score,
                            p1Feedback: result.p1Feedback,
                            p2Feedback: result.p2Feedback,
                            p1Id, p2Id, p1Text, p2Text 
                        }
                    });
                } catch (err) {
                    setError("Judging failed.");
                }
            };

            // --- Actions ---
            const createRoom = async () => {
                if (!user) return;
                const newRoomId = generateRoomCode();
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', newRoomId);
                try {
                    await setDoc(roomRef, {
                        id: newRoomId, host: playerId, players: [playerId],
                        status: 'waiting', claimObj: getRandomClaimObj(), submissions: {},
                        scores: { [playerId]: 0 }, round: 1, createdAt: Date.now(), isSolo: false
                    });
                    setRoomId(newRoomId);
                    setError('');
                } catch (err) { setError("Failed to create room."); }
            };

            const startSoloMatch = async () => {
                if (!user) return;
                const newRoomId = "SOLO_" + generateRoomCode();
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', newRoomId);
                try {
                    await setDoc(roomRef, {
                        id: newRoomId, host: playerId, players: [playerId, 'BOT'],
                        status: 'playing', claimObj: getRandomClaimObj(), submissions: {},
                        scores: { [playerId]: 0, 'BOT': 0 }, round: 1, createdAt: Date.now(), isSolo: true
                    });
                    setRoomId(newRoomId);
                    setError('');
                } catch (err) { setError("Failed to start solo match."); }
            };

            const joinRoom = async (e) => {
                e.preventDefault();
                if (!user || !joinCodeInput.trim()) return;
                const code = joinCodeInput.trim().toUpperCase();
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
                try {
                    const roomSnap = await getDoc(roomRef);
                    if (!roomSnap.exists()) return setError("Room not found.");
                    
                    const roomData = roomSnap.data();
                    if (roomData.players.length >= 2 && !roomData.players.includes(playerId)) return setError("Room is full.");

                    if (!roomData.players.includes(playerId)) {
                        const newPlayers = [...roomData.players, playerId];
                        await updateDoc(roomRef, {
                            players: newPlayers, scores: { ...roomData.scores, [playerId]: 0 },
                            status: newPlayers.length >= 2 ? 'playing' : 'waiting'
                        });
                    }
                    setRoomId(code);
                    setError('');
                } catch (err) { setError("Failed to join room."); }
            };

            const submitEvidence = async (e) => {
                e.preventDefault();
                if (!user || !room || !mySubmission.trim() || isSubmitting) return;
                setIsSubmitting(true);
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                try {
                    let updatedSubmissions = { ...room.submissions, [playerId]: mySubmission };
                    
                    if (room.isSolo) {
                        updatedSubmissions['BOT'] = room.claimObj.botResponse;
                    }

                    const updates = { submissions: updatedSubmissions };
                    if (Object.keys(updatedSubmissions).length === 2) updates.status = 'judging';
                    await updateDoc(roomRef, updates);
                } catch (err) { setError("Failed to submit."); } 
                finally { setIsSubmitting(false); }
            };

            const startNextRound = async () => {
                if (!user || room?.host !== playerId) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                try {
                    await updateDoc(roomRef, {
                        status: 'playing', claimObj: getRandomClaimObj(), submissions: {},
                        lastResult: null, round: room.round + 1
                    });
                    setMySubmission('');
                } catch (err) { setError("Failed to start next round."); }
            };

            const leaveRoom = async () => {
                if (roomId) {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                    try {
                        await deleteDoc(roomRef);
                    } catch(e) { console.error(e); }
                }
                setRoom(null);
                setRoomId(null);
                setJoinCodeInput('');
                setMySubmission('');
                setError('');
            };

            const copyToClipboard = () => {
                const textArea = document.createElement("textarea");
                textArea.value = room.id;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            };

            // --- UI Components ---
            if (authLoading) {
                return (
                    <div className="min-h-screen bg-[#0a0a0f] flex flex-col items-center justify-center text-amber-500">
                        <Loader2 className="w-10 h-10 animate-spin mb-4" />
                        <span className="text-lg font-serif tracking-widest uppercase">Initializing Showdown...</span>
                    </div>
                );
            }

            // 1. LOBBY VIEW
            if (!room) {
                return (
                    <div className="min-h-screen bg-[#0a0a0f] text-slate-200 flex flex-col items-center justify-center p-6 font-sans relative overflow-hidden">
                        <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-violet-900/20 blur-[120px] rounded-full pointer-events-none"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-amber-900/10 blur-[120px] rounded-full pointer-events-none"></div>
                        
                        <div className="max-w-md w-full space-y-8 relative z-10">
                            <div className="text-center">
                                <div className="mx-auto w-24 h-24 bg-gradient-to-br from-amber-400 to-amber-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl shadow-amber-500/20 transform rotate-3 hover:rotate-0 transition-transform duration-300">
                                    <Scale className="w-12 h-12 text-[#0a0a0f]" />
                                </div>
                                <h1 className="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-600 mb-3 drop-shadow-sm">
                                    Argument Showdown
                                </h1>
                                <p className="text-violet-200/70 font-serif italic text-lg">Defend the claim. Defeat your opponent.</p>
                            </div>

                            {error && (
                                <div className="bg-rose-950/50 border border-rose-500/30 text-rose-300 p-4 rounded-xl flex items-center text-sm shadow-lg">
                                    <AlertCircle className="w-5 h-5 mr-3 flex-shrink-0" />
                                    {error}
                                </div>
                            )}

                            <div className="bg-white/[0.03] backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl space-y-4">
                                <button
                                    onClick={startSoloMatch}
                                    className="w-full flex items-center justify-center py-4 px-4 rounded-2xl shadow-lg text-base font-bold text-white bg-white/5 border border-white/10 hover:bg-white/10 hover:scale-[1.02] transform transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0a0a0f] focus:ring-violet-500"
                                >
                                    <Bot className="w-5 h-5 mr-2 text-violet-400" />
                                    Practice Solo (vs Bot)
                                </button>

                                <div className="relative my-4">
                                    <div className="absolute inset-0 flex items-center">
                                        <div className="w-full border-t border-white/10"></div>
                                    </div>
                                    <div className="relative flex justify-center text-sm">
                                        <span className="px-4 bg-[#0a0a0f] text-white/40 uppercase tracking-widest text-[10px] font-bold">Multiplayer</span>
                                    </div>
                                </div>

                                <button
                                    onClick={createRoom}
                                    className="w-full flex items-center justify-center py-4 px-4 rounded-2xl shadow-lg text-base font-bold text-[#0a0a0f] bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-300 hover:to-amber-400 hover:scale-[1.02] transform transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0a0a0f] focus:ring-amber-500"
                                >
                                    <Users className="w-5 h-5 mr-2" />
                                    Host a Match
                                </button>

                                <form onSubmit={joinRoom} className="pt-2">
                                    <div className="flex space-x-2">
                                        <input
                                            type="text"
                                            required
                                            placeholder="CODE"
                                            className="block w-full px-4 py-3 border border-white/10 rounded-xl bg-black/50 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent uppercase tracking-[0.2em] text-center text-lg font-black transition-all"
                                            value={joinCodeInput}
                                            onChange={(e) => setJoinCodeInput(e.target.value)}
                                        />
                                        <button
                                            type="submit"
                                            className="flex items-center justify-center px-6 border border-white/10 rounded-xl shadow-sm text-sm font-bold text-white hover:bg-white/5 hover:scale-[1.02] transform transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#0a0a0f] focus:ring-amber-500"
                                        >
                                            Join
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            const isHost = room.host === playerId;
            const opponentId = room.players.find(id => id !== playerId);
            const myScore = room.scores[playerId] || 0;
            const opponentScore = opponentId ? (room.scores[opponentId] || 0) : 0;

            // Header Component
            const GameHeader = () => (
                <div className="bg-black/40 backdrop-blur-md border-b border-white/5 py-4 px-6 sticky top-0 z-50">
                    <div className="max-w-6xl mx-auto flex items-center justify-between">
                        <div className="flex items-center space-x-6">
                            <button 
                                onClick={leaveRoom}
                                className="p-2 text-white/40 hover:text-white hover:bg-white/10 rounded-lg transition-colors group flex items-center"
                                title="Leave Match"
                            >
                                <ArrowLeft className="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform" />
                                <span className="text-sm font-bold">Leave</span>
                            </button>
                            <div className="flex items-center space-x-3 border-l border-white/10 pl-6">
                                 <div className={`p-2 rounded-lg shadow-lg ${room.isSolo ? 'bg-violet-600' : 'bg-gradient-to-br from-amber-400 to-amber-600'}`}>
                                    {room.isSolo ? <Bot className="w-4 h-4 text-white" /> : <Scale className="w-4 h-4 text-[#0a0a0f]" />}
                                 </div>
                                 <div>
                                    <h1 className="font-bold text-white text-sm tracking-widest uppercase">Round {room.round}</h1>
                                    <span className="text-xs text-amber-500/70 font-mono">{room.isSolo ? 'Solo Practice' : `Code: ${room.id}`}</span>
                                 </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- Main View Render Logic ---
            return (
                <div className="min-h-screen flex flex-col font-sans relative bg-[#0a0a0f]">
                    <GameHeader />
                    
                    <main className="flex-1 max-w-6xl w-full mx-auto p-6 flex flex-col items-center">
                        
                        {/* WAITING STATE */}
                        {room.status === 'waiting' && (
                            <div className="text-center mt-20 space-y-6">
                                <h2 className="text-3xl font-bold text-white">Waiting for Opponent...</h2>
                                <p className="text-white/60">Share this room code with your challenger:</p>
                                <div className="flex items-center justify-center space-x-4 bg-white/5 p-4 rounded-2xl border border-white/10 inline-flex">
                                    <span className="text-4xl font-black tracking-widest text-amber-500">{room.id}</span>
                                    <button 
                                        onClick={copyToClipboard} 
                                        className="p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-colors"
                                        title="Copy Code"
                                    >
                                        <Copy className="w-6 h-6 text-white" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* PLAYING STATE */}
                        {room.status === 'playing' && (
                            <div className="w-full max-w-3xl mt-10">
                                <div className="bg-white/5 p-8 rounded-2xl border border-white/10 mb-8 text-center shadow-xl">
                                    <h2 className="text-sm text-amber-500 font-bold mb-4 uppercase tracking-[0.2em]">The Claim</h2>
                                    <p className="text-2xl font-serif text-white leading-relaxed">{room.claimObj.text}</p>
                                </div>
                                
                                {!room.submissions[playerId] ? (
                                    <form onSubmit={submitEvidence} className="space-y-4">
                                        <textarea 
                                            value={mySubmission}
                                            onChange={(e) => setMySubmission(e.target.value)}
                                            placeholder="Construct your argument here... (Be sure to use transitions and specific evidence!)"
                                            className="w-full h-56 p-6 bg-black/50 border border-white/10 rounded-2xl focus:ring-2 focus:ring-amber-500 focus:outline-none text-white resize-none shadow-inner"
                                            required
                                        ></textarea>
                                        <button 
                                            type="submit" 
                                            disabled={isSubmitting}
                                            className="w-full py-4 bg-gradient-to-r from-amber-400 to-amber-600 hover:from-amber-300 hover:to-amber-500 text-[#0a0a0f] font-black uppercase tracking-widest rounded-xl disabled:opacity-50 transition-all transform hover:scale-[1.01] shadow-lg"
                                        >
                                            {isSubmitting ? 'Submitting...' : 'Submit Argument'}
                                        </button>
                                    </form>
                                ) : (
                                    <div className="text-center mt-20">
                                        <Loader2 className="w-12 h-12 animate-spin mx-auto mb-6 text-amber-500" />
                                        <p className="text-lg text-white/60 animate-pulse">Waiting for opponent to submit...</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* JUDGING STATE */}
                        {room.status === 'judging' && (
                            <div className="text-center mt-32">
                                <Scale className="w-20 h-20 animate-pulse mx-auto mb-8 text-amber-500" />
                                <h2 className="text-3xl font-black text-white tracking-widest uppercase">The Judge is Deliberating</h2>
                                <p className="text-white/50 mt-4 font-serif italic">Analyzing logic, warrants, and evidence...</p>
                            </div>
                        )}

                        {/* FINISHED STATE */}
                        {room.status === 'finished' && room.lastResult && (
                            <div className="w-full max-w-4xl mt-10 space-y-8 animate-in fade-in zoom-in duration-500">
                                <div className="text-center mb-12">
                                    <h2 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-600 mb-4 drop-shadow-lg">
                                        {room.lastResult.winnerId === 'tie' ? "IT'S A TIE!" : 
                                         room.lastResult.winnerId === playerId ? "VICTORY!" : "DEFEAT!"}
                                    </h2>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {/* Player 1 Card */}
                                    <div className={`p-6 rounded-2xl border ${room.lastResult.winnerId === room.lastResult.p1Id ? 'bg-amber-500/10 border-amber-500/50' : 'bg-white/5 border-white/10'}`}>
                                        <h3 className="font-bold text-white/50 uppercase tracking-widest text-xs mb-4">Player 1</h3>
                                        <p className="text-4xl font-black text-white mb-4">{room.lastResult.p1Score} <span className="text-sm font-normal text-white/50">pts</span></p>
                                        <div className="bg-black/50 p-4 rounded-xl text-sm text-white/80 font-serif italic border border-white/5">
                                            "{room.lastResult.p1Feedback}"
                                        </div>
                                    </div>

                                    {/* Player 2 Card */}
                                    <div className={`p-6 rounded-2xl border ${room.lastResult.winnerId === room.lastResult.p2Id ? 'bg-amber-500/10 border-amber-500/50' : 'bg-white/5 border-white/10'}`}>
                                        <h3 className="font-bold text-white/50 uppercase tracking-widest text-xs mb-4">{room.isSolo ? 'The Bot' : 'Player 2'}</h3>
                                        <p className="text-4xl font-black text-white mb-4">{room.lastResult.p2Score} <span className="text-sm font-normal text-white/50">pts</span></p>
                                        <div className="bg-black/50 p-4 rounded-xl text-sm text-white/80 font-serif italic border border-white/5">
                                            "{room.lastResult.p2Feedback}"
                                        </div>
                                    </div>
                                </div>

                                {room.host === playerId && (
                                    <button 
                                        onClick={startNextRound}
                                        className="mx-auto mt-8 block py-4 px-12 bg-white/10 hover:bg-white/20 text-white font-bold tracking-widest uppercase rounded-xl transition-all border border-white/20"
                                    >
                                        Start Next Round
                                    </button>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // --- Mount React Application ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
