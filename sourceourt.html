<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source Court — AP Research Edition</title>
<style>
/* ===== RESET & ROOT ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07091a;
  --surface:     #0f1424;
  --card:        #131828;
  --card2:       #1a2040;
  --gold:        #c9a84c;
  --gold-bright: #f0c94a;
  --gold-dim:    rgba(201,168,76,0.18);
  --gold-border: rgba(201,168,76,0.35);
  --text:        #e4e6f2;
  --muted:       #6b7492;
  --red:         #e63946;
  --red-dim:     rgba(230,57,70,0.12);
  --green:       #2a9d8f;
  --green-dim:   rgba(42,157,143,0.12);
  --radius:      12px;
  --shadow:      0 6px 28px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(201,168,76,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 60% 40% at 85% 20%, rgba(42,100,157,0.04) 0%, transparent 100%);
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; animation: fadeUp 0.3s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== SHARED UTILITY ===== */
.gold { color: var(--gold); }
.muted { color: var(--muted); }
.sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
.uppercase { text-transform: uppercase; letter-spacing: 0.14em; }
.center { text-align: center; }

/* ===== WELCOME SCREEN ===== */
#screen-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px 60px;
  gap: 0;
}
#screen-welcome.active { display: flex; }

.emblem {
  text-align: center;
  margin-bottom: 36px;
}
.emblem-icon {
  font-size: 60px;
  display: block;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 24px rgba(201,168,76,0.45));
  animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 12px rgba(201,168,76,0.3)); }
  to   { filter: drop-shadow(0 0 28px rgba(201,168,76,0.6)); }
}
.emblem-title {
  font-size: clamp(38px, 9vw, 58px);
  color: var(--gold);
  letter-spacing: 0.18em;
  text-shadow: 0 0 40px rgba(201,168,76,0.25);
  line-height: 1;
}
.emblem-sub {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

.welcome-card {
  background: var(--card);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 32px 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
}
.welcome-card h2 {
  font-size: 20px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 10px;
}
.welcome-intro {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
  text-align: center;
  margin-bottom: 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.welcome-intro em { color: var(--text); font-style: normal; }

/* ===== INSTRUCTIONS ===== */
.instructions-box {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 24px;
  text-align: left;
}
.instructions-box h3 {
  font-size: 13px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.instructions-box ol {
  padding-left: 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.instructions-box li { margin-bottom: 8px; }
.instructions-box li:last-child { margin-bottom: 0; }
.instructions-box strong { color: var(--text); }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.form-group input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 11px 15px;
  color: var(--text);
  font-size: 15px;
  font-family: Georgia, serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}
.form-group input::placeholder { color: #3a4060; }

.btn-enter {
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  cursor: pointer;
  margin-top: 6px;
